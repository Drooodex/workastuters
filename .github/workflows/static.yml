<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Партнёрка для репетиторов — Зарабатывай, помогая другим</title>
  <meta name="description" content="Получайте [Сумма] ₽ за каждого приведённого ученика. Помогайте детям учиться лучше — и зарабатывайте пассивно."/>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0a0a15;
      --card: #141426;
      --text: #d4d4ff;
      --accent: #8b5cf6;
      --accent-dark: #6d28d9;
      --money: #10b981;
      --glow: rgba(139, 92, 246, 0.25);
      --border: #2d2d4a;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      overflow-x: hidden;
    }

    header {
      position: relative;
      background: linear-gradient(135deg, #1e1b4b 0%, #0f0f1f 100%);
      padding: 160px 20px 120px;
      text-align: center;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(139,92,246,0.12) 0%, transparent 50%);
      pointer-events: none;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 8vw, 4.8rem);
      margin-bottom: 1.2rem;
      color: white;
      text-shadow: 0 0 40px rgba(139,92,246,0.4);
    }

    .lead {
      font-size: clamp(1.25rem, 4vw, 1.55rem);
      max-width: 820px;
      margin: 0 auto 3rem;
      color: #c4c4ff;
      opacity: 0.95;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      color: white;
      padding: 16px 40px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.15rem;
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 10px 30px var(--glow);
      margin: 12px;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: left 0.7s;
    }

    .btn:hover::before { left: 100%; }
    .btn:hover {
      transform: translateY(-6px) scale(1.04);
      box-shadow: 0 20px 50px rgba(139,92,246,0.5);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
    }

    section {
      padding: 110px 20px;
      max-width: 1180px;
      margin: 0 auto;
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.9s cubic-bezier(0.22, 1, 0.36, 1);
    }

    section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    h2 {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      margin-bottom: 3rem;
      color: white;
      position: relative;
      display: inline-block;
    }

    h2::after {
      content: '';
      position: absolute;
      bottom: -12px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 4px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 32px;
    }

    .card, .video-card, .tutor-card {
      background: var(--card);
      border-radius: 20px;
      border: 1px solid var(--border);
      overflow: hidden;
      transition: all 0.5s ease;
      position: relative;
    }

    .card:hover, .video-card:hover, .tutor-card:hover {
      transform: translateY(-12px) scale(1.02);
      border-color: var(--accent);
      box-shadow: 0 30px 70px rgba(0,0,0,0.6), 0 0 40px var(--glow);
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
    }

    .video-wrapper iframe,
    .video-wrapper video {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    .emotion-block {
      background: linear-gradient(135deg, #111827 0%, #0f172a 100%);
      border-radius: 24px;
      padding: 60px 40px;
      text-align: center;
      border: 1px solid rgba(139,92,246,0.2);
      box-shadow: 0 0 60px rgba(139,92,246,0.15);
      margin: 80px auto;
      max-width: 980px;
    }

    .emotion-block h3 {
      font-size: 2.2rem;
      margin-bottom: 1.8rem;
      color: var(--accent);
    }

    .emotion-text {
      font-size: 1.18rem;
      max-width: 820px;
      margin: 0 auto;
      color: #d1d5ff;
    }

    .money-big {
      font-size: 3.8rem;
      color: var(--money);
      font-weight: 800;
      margin: 1.5rem 0;
      text-shadow: 0 0 30px rgba(16,185,129,0.4);
    }

    .tutor-card img {
      width: 100%;
      height: 340px;
      object-fit: cover;
      display: block;
    }
    .tutor-info {
      padding: 28px 24px;
      text-align: center;
    }
    .tutor-name {
      font-size: 1.65rem;
      color: white;
      margin-bottom: 6px;
    }
    .tutor-subject {
      color: var(--accent);
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 16px;
    }
    .tutor-text {
      font-size: 1.05rem;
      color: #c4c4ff;
      line-height: 1.6;
      min-height: 110px;
    }

    footer {
      background: #000;
      color: #8a8aff;
      text-align: center;
      padding: 60px 20px 40px;
      font-size: 0.98rem;
    }

    @media (max-width: 768px) {
      header { padding: 120px 20px 80px; }
      section { padding: 70px 20px; }
      .emotion-block { padding: 40px 24px; }
    }
  </style>
</head>
<body>

  <header id="home">
    <h1>Зарабатывай, <br>помогая детям учиться</h1>
    <p class="lead">Получайте <strong style="color:var(--money);">[Сумма] ₽</strong> за каждого ученика,<br>которого порекомендуете по другому предмету.</p>
    <div>
      <a href="#contacts" class="btn">Стать партнёром</a>
      <a href="#emotion" class="btn btn-outline">Почему это важно</a>
    </div>
  </header>

  <section id="benefits">
    <h2>Ваши преимущества</h2>
    <div class="grid">
      <div class="card" style="padding:40px 28px; text-align:center;">
        <div style="font-size:4.5rem; margin-bottom:1.2rem; color:var(--accent);">💰</div>
        <h3 style="font-size:1.9rem; margin-bottom:1rem;">Пассивный доход</h3>
        <div class="money-big">[Сумма] ₽</div>
        <p style="font-size:1.1rem;">за каждого реального ученика — без рекламы и звонков</p>
      </div>

      <div class="card" style="padding:40px 28px; text-align:center;">
        <div style="font-size:4.5rem; margin-bottom:1.2rem; color:var(--accent);">🤝</div>
        <h3 style="font-size:1.9rem; margin-bottom:1rem;">Сохраняете своих учеников</h3>
        <p style="font-size:1.1rem;">Мы забираем только те запросы, с которыми вы сами не работаете</p>
      </div>

      <div class="card" style="padding:40px 28px; text-align:center;">
        <div style="font-size:4.5rem; margin-bottom:1.2rem; color:var(--accent);">🌟</div>
        <h3 style="font-size:1.9rem; margin-bottom:1rem;">Помогаете детям</h3>
        <p style="font-size:1.1rem;">Вместо «не мой предмет» — даёте ребёнку нужного специалиста</p>
      </div>
    </div>
  </section>

  <section id="emotion" class="emotion-block">
    <h3>Вы делаете важное дело</h3>
    <p class="emotion-text">
      Каждый раз, когда вы рекомендуете нас по другому предмету, вы не просто зарабатываете — 
      вы помогаете ребёнку получить качественное образование именно там, где оно сейчас нужно больше всего.<br><br>
      
      Родители получают проверенного репетитора, ученик — шанс закрыть пробелы и полюбить предмет, 
      а вы — честное вознаграждение и хорошее чувство, что сделали чуточку лучше чью-то учёбу.<br><br>
      
      Это не просто реферальная программа.<br>
      <strong>Это цепочка добра, в которой все выигрывают.</strong>
    </p>
  </section>

  <section id="tutors">
    <h2>Наши репетиторы</h2>
    <div class="grid">

      <div class="tutor-card">
        <img src="https://img.freepik.com/free-photo/young-woman-teacher-wearing-glasses-with-book-explaining-lesson-looking-crazy-happy-clenching-fists-sitting-school-desk-front-blackboard-classroom_141793-131249.jpg" alt="Анна Смирнова">
        <div class="tutor-info">
          <div class="tutor-name">Анна Смирнова</div>
          <div class="tutor-subject">Английский язык • 7 лет опыта</div>
          <div class="tutor-text">
            «За 8 месяцев уже заработала больше 140 000 ₽ на рекомендациях. 
            Ученики по математике и физике идут ко мне, а я спокойно направляю их в партнёрскую школу. 
            Деньги приходят стабильно, всё прозрачно.»
          </div>
        </div>
      </div>

      <div class="tutor-card">
        <img src="https://previews.123rf.com/images/lightfieldstudios/lightfieldstudios1903/lightfieldstudios190306100/118632254-smiling-male-teacher-sitting-at-desk-and-showing-laptop-with-blank-screen-in-classroom.jpg" alt="Максим Иванов">
        <div class="tutor-info">
          <div class="tutor-name">Максим Иванов</div>
          <div class="tutor-subject">Математика • Физика • 5 лет опыта</div>
          <div class="tutor-text">
            «Самое крутое — это когда ученик, которого я не мог взять, остаётся доволен и продолжает учиться. 
            А я получаю [Сумма] ₽ за каждого. Уже привёл 12 человек и продолжаю. 
            Рекомендую всем репетиторам!»
          </div>
        </div>
      </div>

    </div>
  </section>

  <section id="video-reviews">
    <h2>Видео отзывы</h2>
    <div class="grid">

      <div class="video-card">
        <div class="video-wrapper">
          <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="Отзыв 1" allowfullscreen></iframe>
        </div>
      </div>

      <div class="video-card">
        <div class="video-wrapper">
          <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="Отзыв 2" allowfullscreen></iframe>
        </div>
      </div>

      <div class="video-card">
        <div class="video-wrapper">
          <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="Отзыв 3" allowfullscreen></iframe>
        </div>
      </div>

    </div>
  </section>

  <section id="how">
    <h2>Как начать за 3 шага</h2>
    <div class="grid">
      <div class="card" style="padding:48px 32px; text-align:center;">
        <div style="font-size:5rem; margin-bottom:1.5rem; color:var(--accent);">1</div>
        <h3 style="font-size:2rem;">Напишите нам</h3>
        <p>В Telegram — пришлём договор за 2 минуты</p>
      </div>

      <div class="card" style="padding:48px 32px; text-align:center;">
        <div style="font-size:5rem; margin-bottom:1.5rem; color:var(--accent);">2</div>
        <h3 style="font-size:2rem;">Получите ссылку</h3>
        <p>Персональная ссылка + готовые шаблоны сообщений</p>
      </div>

      <div class="card" style="padding:48px 32px; text-align:center;">
        <div style="font-size:5rem; margin-bottom:1.5rem; color:var(--accent);">3</div>
        <h3 style="font-size:2rem;">Получайте деньги</h3>
        <p>После 2 занятий — [Сумма] ₽ на карту</p>
      </div>
    </div>
  </section>

  <section id="contacts">
    <h2>Готовы помогать и зарабатывать?</h2>
    <p style="text-align:center; font-size:1.4rem; margin:2rem auto; max-width:700px; color:#c4c4ff;">
      Просто напишите в Telegram — ответим за 5–15 минут<br><br>
      <a href="https://t.me/ВАШ_НИК" class="btn" style="font-size:1.3rem; padding:18px 50px;">
        @ВАШ_НИК_в_telegram
      </a>
    </p>
  </section>

  <footer>
    © 2026 Партнёрская программа репетиторов<br>
    Официально • Договор • Прозрачные выплаты
  </footer>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('section').forEach(section => {
      observer.observe(section);
    });
  </script>

</body>
</html>
